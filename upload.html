<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload details</title>
    <link rel="stylesheet" href="upload.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">Upload your details</div>
      <div class="middle-section">
        <label for="name">Name:</label>
        <input class="search-bar" type="text" placeholder="eg. Omondi Timon" />
        <label for="platform">Platform</label><br />
        <input type="checkbox" />TikTok <br />
        <input type="checkbox" />InstaGram <br />
        <input type="checkbox" />YouTube<br /><br />
        <label for="phone">Phone:</label>
        <input placeholder="eg. 0712345678" type="text" /><br />
        <label for="phone">Followers:</label>
        <input placeholder="eg. 3100" type="text" />
        <label>Upload Image:</label><br />
        <input type="file" accept="image/*" />
      </div>
      <div>
        <input class="submit-btn" type="submit" value="submit" />
      </div>
    </div>
  </body>
</html>
