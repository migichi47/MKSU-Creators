<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/Join/join.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join as a creator</title>
  </head>
  <body>
    <div>
      <div class="header">
        <img src="images/Machakos_University_Logo.png" alt="" />
        <div>MKSU CREATORS AWARDS</div>
      </div>

      <div>
        <p>Join as a creator</p>
        <p>Get votes from your followers</p>
      </div>

      <div class="tile">
        <h1>Creator details</h1>

        <div class="name-section">
          &#8226<input type="text" placeholder="Name" name="" id="" />
        </div>

        <div class="admission-section">
          &#8226<input type="text" placeholder="Adm. eg. J17-0458-2025" />
        </div>

        <div class="academic-year-section">
          &#8226<p>Academic year</p>
          <select name="" id="">
            <option value="">Year 1</option>
            <option value="">Year 2</option>
            <option value="">Year 3</option>
            <option value="">Year 4</option>
            <option value="">Year 5</option>
            <option value="">other</option>
          </select>
        </div>

        <div class="platform-section">
          &#8226<p>Platform</p>
          <select name="" id="">
            <option value="">TikTok</option>
            <option value="">Instagram</option>
          </select>
        </div>

        <div class="followers-section">
          &#8226<input type="text" placeholder="Followers eg. 6700" />
        </div>

        <div class="handle-section">
          &#8226<input
            type="text"
            placeholder="@handle   eg. @omondi"
            name=""
            id=""
          />
        </div>
        <button class="js-lets-go-btn">Let's Go</button>
      </div>
    </div>

    <script src="scripts/join/join.js"></script>
  </body>
</html>
